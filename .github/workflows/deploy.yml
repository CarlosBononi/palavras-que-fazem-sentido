name: Deploy para GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy para GitHub Pages
        uses: actions/deploy-pages@v4
```

---

## Passo 3 — Ative o GitHub Pages

1. No repositório, vá em **Settings → Pages**
2. Em **Source**, selecione **GitHub Actions**
3. Clique em **Save**

---

## Passo 4 — Aguarde o deploy 🚀

Vá em **Actions** no menu do repositório. Você verá o processo rodando. Em **2 a 3 minutos** o app estará no ar em:
```
https://SEU_USUARIO.github.io/palavras-que-fazem-sentido/
